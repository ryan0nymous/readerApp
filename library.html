<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LIBRARY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #0e0d0b;
    --surface: #161410;
    --border: #2a2620;
    --text: #e8e0d0;
    --muted: #6b6358;
    --accent: #c9a84c;
    --accent2: #7a5c2e;
    --red: #c0392b;
    --reader-bg: #f5f0e8;
    --reader-text: #1a1610;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
  }

  .auth-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .auth-subtitle {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  .auth-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.9rem 2.5rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .auth-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .config-note {
    margin-top: 2rem;
    color: var(--muted);
    font-size: 10px;
    line-height: 1.8;
    max-width: 400px;
  }

  .config-note a { color: var(--accent2); }

  /* ── MAIN APP ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--accent);
    letter-spacing: 0.2em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  #search {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 0.5rem 0.8rem;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search:focus { border-color: var(--accent2); }
  #search::placeholder { color: var(--muted); }

  .sign-out {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
  }

  .sign-out:hover { color: var(--text); }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.7rem 1.5rem;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.3rem 0.8rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .book-count {
    margin-left: auto;
    color: var(--muted);
    font-size: 10px;
    white-space: nowrap;
  }

  /* ── BOOK GRID ── */
  #book-list {
    padding: 1.5rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
  }

  .book-card {
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
    overflow: hidden;
  }

  .book-card:hover {
    border-color: var(--accent2);
    transform: translateY(-2px);
  }

  .book-cover {
    width: 100%;
    aspect-ratio: 2/3;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .book-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .book-cover-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 1rem;
    text-align: center;
  }

  .cover-title {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 0.5rem;
  }

  .cover-author {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .format-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 8px;
    letter-spacing: 0.1em;
    padding: 2px 5px;
    text-transform: uppercase;
  }

  .format-badge.epub { border-color: var(--accent2); color: var(--accent); }
  .format-badge.pdf { border-color: #4a6741; color: #7ab36e; }

  .book-info {
    padding: 0.6rem 0.7rem;
    border-top: 1px solid var(--border);
  }

  .book-title {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .book-author {
    font-size: 9px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── LOADING ── */
  #loading {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem;
    gap: 1rem;
  }

  .loading-text {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 1px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── READER OVERLAY ── */
  #reader-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--reader-bg);
    z-index: 1000;
    flex-direction: column;
  }

  .reader-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.8rem 1.2rem;
    background: #ede8e0;
    border-bottom: 1px solid #d4cdc0;
    flex-shrink: 0;
  }

  .reader-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    color: var(--reader-text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .reader-close {
    background: none;
    border: 1px solid #c4bdb0;
    color: #6b6358;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 0.3rem 0.8rem;
    cursor: pointer;
    text-transform: uppercase;
    margin-left: 1rem;
    flex-shrink: 0;
  }

  #epub-frame {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  #epub-container {
    width: 100%;
    height: calc(100vh - 60px);
    overflow: hidden;
  }

  #pdf-frame {
    flex: 1;
    border: none;
  }

  /* ── CONFIG MODAL ── */
  #config-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2rem;
    width: 100%;
    max-width: 480px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--accent);
    margin-bottom: 1.5rem;
  }

  .field-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
    display: block;
  }

  .field-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 0.6rem 0.8rem;
    outline: none;
    margin-bottom: 1.2rem;
  }

  .field-input:focus { border-color: var(--accent2); }

  .modal-actions {
    display: flex;
    gap: 0.8rem;
    justify-content: flex-end;
    margin-top: 0.5rem;
  }

  .btn-primary {
    background: var(--accent);
    border: none;
    color: var(--bg);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.6rem 1.5rem;
    cursor: pointer;
  }

  .btn-secondary {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.6rem 1.5rem;
    cursor: pointer;
  }

  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
  }

  /* Mobile adjustments */
  @media (max-width: 600px) {
    #search { width: 140px; }
    #book-list { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.7rem; padding: 1rem; }
    .auth-title { font-size: 3rem; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-title">LIBRARY</div>
  <div class="auth-subtitle">Personal Collection</div>
  <button class="auth-btn" onclick="startAuth()">Connect Google Drive</button>
  <div class="config-note">
    Requires a Google Cloud OAuth Client ID.<br>
    <a href="#" onclick="showConfig()">Enter credentials</a> to get started.
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="logo">LIBRARY</div>
    <div class="header-right">
      <input type="search" id="search" placeholder="search titles, authors..." oninput="filterBooks()">
      <button class="sign-out" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('epub', this)">ePub</button>
    <button class="filter-btn" onclick="setFilter('pdf', this)">PDF</button>
    <span class="book-count" id="book-count"></span>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Scanning library...</div>
  </div>

  <div id="book-list"></div>
</div>

<!-- READER OVERLAY -->
<div id="reader-overlay">
  <div class="reader-header">
    <div class="reader-title" id="reader-title"></div>
    <button class="reader-close" onclick="closeReader()">✕ Close</button>
  </div>
  <div id="epub-frame" style="display:none">
    <div id="epub-container"></div>
  </div>
  <iframe id="pdf-frame" style="display:none"></iframe>
</div>

<!-- CONFIG MODAL -->
<div id="config-modal">
  <div class="modal-box">
    <div class="modal-title">Configure</div>
    <label class="field-label">Google OAuth Client ID</label>
    <input class="field-input" id="cfg-client-id" placeholder="xxxx.apps.googleusercontent.com">
    <label class="field-label">Google Drive Folder Name</label>
    <input class="field-input" id="cfg-folder" placeholder="CalibreLibrary">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="hideConfig()">Cancel</button>
      <button class="btn-primary" onclick="saveConfig()">Save</button>
    </div>
  </div>
</div>

<!-- EPUB.JS -->
<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

<script>
// ── CONFIG ──
const CONFIG_KEY = 'library_config';
const CACHE_KEY = 'library_cache';
const TOKEN_KEY = 'library_token';
const TOKEN_TIME_KEY = 'library_token_time';
let config = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}');

// ── STATE ──
let allBooks = [];
let activeFilter = 'all';
let accessToken = null;
let currentBook = null;

// ── INIT ──
window.onload = () => {
  // Check for OAuth callback
  const hash = window.location.hash;
  if (hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    accessToken = params.get('access_token');
    localStorage.setItem(TOKEN_KEY, accessToken);
    localStorage.setItem(TOKEN_TIME_KEY, Date.now().toString());
    window.location.hash = '';
    showApp();
    loadLibrary();
    return;
  }

  // Check stored token
  const stored = localStorage.getItem(TOKEN_KEY);
  if (stored) {
    if (checkToken(false)) {
      accessToken = stored;
      showApp();
      loadLibrary();
    } else {
      showAuthScreen();
    }
    return;
  }

  // Show auth screen
  if (config.clientId) {
    document.getElementById('auth-screen').querySelector('.config-note').innerHTML =
      'Client ID configured. <a href="#" onclick="showConfig()">Change settings</a>';
  }
};

/**
 * Validates the current OAuth token.
 * Proactive check against the 55-minute limit (tokens usually last 60 min).
 */
function checkToken(proactive = true) {
  const token = localStorage.getItem(TOKEN_KEY);
  const time = localStorage.getItem(TOKEN_TIME_KEY);
  
  if (!token || !time) return false;

  const ageMinutes = (Date.now() - parseInt(time)) / (1000 * 60);
  if (ageMinutes > 55) {
    console.log('Token near expiry, re-authenticating...');
    if (proactive) startAuth();
    return false;
  }
  return true;
}

function forceReAuth() {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(TOKEN_TIME_KEY);
  startAuth();
}

// ── CONFIG MODAL ──
function showConfig() {
  document.getElementById('cfg-client-id').value = config.clientId || '';
  document.getElementById('cfg-folder').value = config.folderName || 'CalibreLibrary';
  document.getElementById('config-modal').style.display = 'flex';
}

function hideConfig() {
  document.getElementById('config-modal').style.display = 'none';
}

function saveConfig() {
  config.clientId = document.getElementById('cfg-client-id').value.trim();
  config.folderName = document.getElementById('cfg-folder').value.trim() || 'CalibreLibrary';
  localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
  hideConfig();
}

// ── AUTH ──
function startAuth() {
  if (!config.clientId) {
    showConfig();
    return;
  }
  const redirectUri = window.location.href.split('#')[0].split('?')[0];
  const scope = 'https://www.googleapis.com/auth/drive.readonly';
  const url = `https://accounts.google.com/o/oauth2/v2/auth?` +
    `client_id=${encodeURIComponent(config.clientId)}` +
    `&redirect_uri=${encodeURIComponent(redirectUri)}` +
    `&response_type=token` +
    `&scope=${encodeURIComponent(scope)}`;
  window.location.href = url;
}

function signOut() {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(TOKEN_TIME_KEY);
  localStorage.removeItem(CACHE_KEY);
  accessToken = null;
  allBooks = [];
  showAuthScreen();
}

// ── UI SWITCHING ──
function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

function showAuthScreen() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ── DRIVE API ──
async function driveRequest(url) {
  const res = await fetch(url, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  if (res.status === 401) {
    forceReAuth();
    throw new Error('Token expired');
  }
  return res.json();
}

async function findFolder(name, parentId = null) {
  let q = `name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
  if (parentId) q += ` and '${parentId}' in parents`;
  const data = await driveRequest(
    `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`
  );
  return data.files && data.files[0] ? data.files[0].id : null;
}

async function getFilesInFolder(folderId) {
  let files = [];
  let pageToken = null;
  do {
    let url = `https://www.googleapis.com/drive/v3/files?` +
      `q=${encodeURIComponent(`'${folderId}' in parents and trashed=false`)}` +
      `&fields=nextPageToken,files(id,name,mimeType,parents,thumbnailLink)` +
      `&pageSize=1000`;
    if (pageToken) url += `&pageToken=${pageToken}`;
    const data = await driveRequest(url);
    files = files.concat(data.files || []);
    pageToken = data.nextPageToken;
  } while (pageToken);
  return files;
}

async function recursiveScan(folderId, depth = 0) {
  if (depth > 4) return [];
  const items = await getFilesInFolder(folderId);
  let books = [];
  const subfolders = items.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
  const files = items.filter(f => {
    const n = f.name.toLowerCase();
    return n.endsWith('.epub') || n.endsWith('.pdf');
  });
  books = books.concat(files);
  for (const folder of subfolders) {
    const sub = await recursiveScan(folder.id, depth + 1);
    books = books.concat(sub);
  }
  return books;
}

// ── PARSE CALIBRE PATH ──
// Calibre stores as Author/Title/file — extract metadata from path context
function parseBookName(filename) {
  // Remove extension
  let name = filename.replace(/\.(epub|pdf)$/i, '');
  // Calibre format: "Title - Author" or just "Title"
  // Try to split on ' - '
  const parts = name.split(' - ');
  if (parts.length >= 2) {
    return { title: parts[0].trim(), author: parts.slice(1).join(' - ').trim() };
  }
  return { title: name.trim(), author: '' };
}

// ── LOAD LIBRARY ──
async function loadLibrary() {
  const loading = document.getElementById('loading');
  
  // Proactive token check before scanning
  if (!checkToken()) return;

  // Try loading from cache first
  const cached = localStorage.getItem(CACHE_KEY);
  if (cached) {
    try {
      allBooks = JSON.parse(cached);
      renderBooks(allBooks);
    } catch(e) { console.error('Cache corrupt', e); }
  } else {
    loading.style.display = 'flex';
  }

  try {
    setLoadingText('Scanning for changes...');
    const folderId = await findFolder(config.folderName || 'CalibreLibrary');
    if (!folderId) {
      setLoadingText(`Folder "${config.folderName}" not found in Drive`);
      loading.style.display = 'flex';
      return;
    }

    const files = await recursiveScan(folderId);

    allBooks = files.map(f => {
      const ext = f.name.split('.').pop().toLowerCase();
      const meta = parseBookName(f.name);
      return {
        id: f.id,
        filename: f.name,
        title: meta.title,
        author: meta.author,
        format: ext,
        thumbnailLink: f.thumbnailLink || null,
      };
    });

    // Sort by title
    allBooks.sort((a, b) => a.title.localeCompare(b.title));

    // Save to cache
    localStorage.setItem(CACHE_KEY, JSON.stringify(allBooks));

    loading.style.display = 'none';
    renderBooks(allBooks);
  } catch (e) {
    if (e.message !== 'Token expired') {
      setLoadingText('Error loading library. Try signing out and back in.');
      loading.style.display = 'flex';
      console.error(e);
    }
  }
}

function setLoadingText(t) {
  document.getElementById('loading-text').textContent = t;
}

// ── RENDER ──
function renderBooks(books) {
  const list = document.getElementById('book-list');
  document.getElementById('book-count').textContent = `${books.length} titles`;

  if (books.length === 0) {
    list.innerHTML = '<div class="empty-state">No books found</div>';
    return;
  }

  list.innerHTML = books.map(b => {
    // Build cover: thumbnail image if available, otherwise text placeholder
    const coverInner = b.thumbnailLink
      ? `<img src="${escAttr(b.thumbnailLink)}?access_token=${encodeURIComponent(accessToken)}"
              alt="${escAttr(b.title)}"
              loading="lazy"
              onerror="this.parentNode.innerHTML='<div class=\\'book-cover-placeholder\\'><div class=\\'cover-title\\'>${escHtmlForAttr(b.title)}</div><div class=\\'cover-author\\'>${escHtmlForAttr(b.author)}</div></div><span class=\\'format-badge ${b.format}\\'>${b.format.toUpperCase()}</span>'">`
      : `<div class="book-cover-placeholder">
           <div class="cover-title">${escHtml(b.title)}</div>
           <div class="cover-author">${escHtml(b.author)}</div>
         </div>`;

    return `
    <div class="book-card" onclick="openBook('${b.id}', '${escHtml(b.title)}', '${b.format}')">
      <div class="book-cover">
        ${coverInner}
        <span class="format-badge ${b.format}">${b.format.toUpperCase()}</span>
      </div>
      <div class="book-info">
        <div class="book-title">${escHtml(b.title)}</div>
        <div class="book-author">${escHtml(b.author) || '—'}</div>
      </div>
    </div>
  `;
  }).join('');
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Used inside attribute values (already HTML-attribute context, single-quote safe version)
function escAttr(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

// Used when interpolating into an attribute string that will itself be HTML (onerror handler)
function escHtmlForAttr(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\\/g,'\\\\');
}

// ── FILTER / SEARCH ──
function setFilter(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterBooks() { applyFilters(); }

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  let books = allBooks;
  if (activeFilter !== 'all') books = books.filter(b => b.format === activeFilter);
  if (q) books = books.filter(b =>
    b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q)
  );
  renderBooks(books);
}

// ── OPEN BOOK ──
async function openBook(fileId, title, format) {
  // Proactive token check before opening
  if (!checkToken()) return;

  document.getElementById('reader-title').textContent = title;
  document.getElementById('reader-overlay').style.display = 'flex';
  document.getElementById('epub-frame').style.display = 'none';
  document.getElementById('pdf-frame').style.display = 'none';

  if (format === 'pdf') {
    // For PDF: use Google Drive viewer (works great on iOS Safari)
    const viewerUrl = `https://drive.google.com/file/d/${fileId}/preview`;
    const frame = document.getElementById('pdf-frame');
    frame.src = viewerUrl;
    frame.style.display = 'block';
  } else {
    // For EPUB: fetch and render with epub.js
    document.getElementById('epub-frame').style.display = 'block';
    const container = document.getElementById('epub-container');
    container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-family:monospace;font-size:12px;">Loading book...</div>';

    try {
      const res = await fetch(
        `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
        { headers: { Authorization: `Bearer ${accessToken}` } }
      );
      
      if (res.status === 401) {
          forceReAuth();
          throw new Error('OAuth token expired. Redirecting to sign-in...');
      }

      const blob = await res.blob();
      const arrayBuffer = await blob.arrayBuffer();

      container.innerHTML = '';

      if (currentBook) { try { currentBook.destroy(); } catch(e) {} }

      if (typeof ePub === 'undefined') {
          throw new Error('EPUB library failed to load. Please check your internet connection and reload.');
      }

      currentBook = ePub(arrayBuffer);
      const rendition = currentBook.renderTo(container, {
        width: '100%',
        height: '100%',
        flow: "scrolled-doc",
        allowScriptedContent: true
      });
      rendition.display();

      // Swipe / arrow key navigation
      rendition.on('keyup', e => {
        if (e.key === 'ArrowRight') rendition.next();
        if (e.key === 'ArrowLeft') rendition.prev();
      });

      container.addEventListener('click', e => {
        const w = container.offsetWidth;
        if (e.clientX > w * 0.6) rendition.next();
        else if (e.clientX < w * 0.4) rendition.prev();
      });

    } catch(e) {
      container.innerHTML = `<div style="padding:2rem;color:#c0392b;font-family:monospace;font-size:12px;">Failed to load book. ${e.message}</div>`;
    }
  }
}

function closeReader() {
  document.getElementById('reader-overlay').style.display = 'none';
  document.getElementById('pdf-frame').src = '';
  if (currentBook) { try { currentBook.destroy(); } catch(e) {} currentBook = null; }
}
