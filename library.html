<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
<title>LIBRARY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #0e0d0b;
    --surface: #161410;
    --border: #2a2620;
    --text: #e8e0d0;
    --muted: #6b6358;
    --accent: #c9a84c;
    --accent2: #7a5c2e;
    --red: #c0392b;
    --reader-bg: #ffffff;
    --reader-text: #1a1610;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
  }

  .auth-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .auth-subtitle {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  .auth-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.9rem 2.5rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .auth-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .config-note {
    margin-top: 2rem;
    color: var(--muted);
    font-size: 10px;
    line-height: 1.8;
    max-width: 400px;
  }

  .config-note a { color: var(--accent2); }

  /* ── MAIN APP ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--accent);
    letter-spacing: 0.2em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  #search {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 0.5rem 0.8rem;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search:focus { border-color: var(--accent2); }
  #search::placeholder { color: var(--muted); }

  .sign-out {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
  }

  .sign-out:hover { color: var(--text); }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.7rem 1.5rem;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.3rem 0.8rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .book-count {
    margin-left: auto;
    color: var(--muted);
    font-size: 10px;
    white-space: nowrap;
  }

  /* ── BOOK GRID ── */
  #book-list {
    padding: 1.5rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
  }

  .book-card {
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
    overflow: hidden;
  }

  .book-card:hover {
    border-color: var(--accent2);
    transform: translateY(-2px);
  }

  .book-cover {
    width: 100%;
    aspect-ratio: 2/3;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .book-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .book-cover-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 1rem;
    text-align: center;
  }

  .cover-title {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 0.5rem;
  }

  .cover-author {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .format-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 8px;
    letter-spacing: 0.1em;
    padding: 2px 5px;
    text-transform: uppercase;
  }

  .format-badge.epub { border-color: var(--accent2); color: var(--accent); }
  .format-badge.pdf { border-color: #4a6741; color: #7ab36e; }

  /* ── READER OVERLAY ── */
  #reader-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--reader-bg);
    z-index: 1000;
    flex-direction: column;
  }

  .reader-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 1.2rem;
    background: #f8f5f0;
    border-bottom: 1px solid #dcd7cf;
    flex-shrink: 0;
  }

  .reader-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    color: var(--reader-text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-right: 1rem;
  }

  .reader-controls {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .ctrl-btn {
    background: white;
    border: 1px solid #c4bdb0;
    color: #4a443a;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    text-transform: uppercase;
  }

  .ctrl-btn:hover { background: #f0ede8; }
  .ctrl-btn:disabled { opacity: 0.3; cursor: default; }

  #epub-content-area {
    flex: 1;
    overflow-y: auto;
    padding: 3rem 1.5rem;
    color: var(--reader-text);
  }

  #epub-container {
    max-width: 700px;
    margin: 0 auto;
    font-family: 'PT Serif', serif;
    font-size: 18px;
    line-height: 1.7;
  }

  #epub-container h1, #epub-container h2, #epub-container h3 {
    font-family: 'Playfair Display', serif;
    margin: 2rem 0 1rem;
    line-height: 1.2;
  }

  #epub-container img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 1.5rem auto;
  }

  #epub-container p { margin-bottom: 1.2rem; }

  #pdf-frame {
    flex: 1;
    border: none;
  }

  /* ── LOADING & MODALS (Kept from original) ── */
  #loading { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 4rem; gap: 1rem; }
  .loading-text { color: var(--muted); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; }
  .spinner { width: 24px; height: 24px; border: 1px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #config-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; padding: 1rem; }
  .modal-box { background: var(--surface); border: 1px solid var(--border); padding: 2rem; width: 100%; max-width: 480px; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--accent); margin-bottom: 1.5rem; }
  .field-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; display: block; }
  .field-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 0.6rem 0.8rem; outline: none; margin-bottom: 1.2rem; }
  .modal-actions { display: flex; gap: 0.8rem; justify-content: flex-end; margin-top: 0.5rem; }
  .btn-primary { background: var(--accent); border: none; color: var(--bg); font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.6rem 1.5rem; cursor: pointer; }
  .btn-secondary { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.6rem 1.5rem; cursor: pointer; }

  @media (max-width: 600px) {
    #search { width: 140px; }
    #book-list { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.7rem; padding: 1rem; }
    #epub-content-area { padding: 2rem 1rem; }
    #epub-container { font-size: 16px; }
    .reader-header { flex-direction: column; gap: 0.5rem; align-items: flex-start; }
    .reader-controls { width: 100%; justify-content: space-between; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-title">LIBRARY</div>
  <div class="auth-subtitle">Personal Collection</div>
  <button class="auth-btn" onclick="startAuth()">Connect Google Drive</button>
  <div class="config-note">
    Requires a Google Cloud OAuth Client ID.<br>
    <a href="#" onclick="showConfig()">Enter credentials</a> to get started.
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="logo">LIBRARY</div>
    <div class="header-right">
      <input type="search" id="search" placeholder="search books..." oninput="filterBooks()">
      <button class="sign-out" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('epub', this)">ePub</button>
    <button class="filter-btn" onclick="setFilter('pdf', this)">PDF</button>
    <span class="book-count" id="book-count"></span>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Scanning library...</div>
  </div>

  <div id="book-list"></div>
</div>

<!-- READER OVERLAY -->
<div id="reader-overlay">
  <div class="reader-header">
    <div class="reader-title" id="reader-title"></div>
    <div class="reader-controls" id="reader-nav-controls" style="display:none">
      <button class="ctrl-btn" onclick="changeFontSize(-2)">A-</button>
      <button class="ctrl-btn" onclick="changeFontSize(2)">A+</button>
      <div style="width:10px"></div>
      <button class="ctrl-btn" id="prev-btn" onclick="prevChapter()">Prev</button>
      <button class="ctrl-btn" id="next-btn" onclick="nextChapter()">Next</button>
      <button class="ctrl-btn" onclick="closeReader()" style="margin-left:5px; border-color:#888;">✕</button>
    </div>
    <button class="ctrl-btn" id="pdf-close" onclick="closeReader()" style="display:none">✕ Close</button>
  </div>
  <div id="epub-content-area" style="display:none">
    <div id="epub-container"></div>
  </div>
  <iframe id="pdf-frame" style="display:none"></iframe>
</div>

<!-- CONFIG MODAL -->
<div id="config-modal">
  <div class="modal-box">
    <div class="modal-title">Configure</div>
    <label class="field-label">Google OAuth Client ID</label>
    <input class="field-input" id="cfg-client-id" placeholder="xxxx.apps.googleusercontent.com">
    <label class="field-label">Google Drive Folder Name</label>
    <input class="field-input" id="cfg-folder" placeholder="CalibreLibrary">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="hideConfig()">Cancel</button>
      <button class="btn-primary" onclick="saveConfig()">Save</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG & STATE ──
const CONFIG_KEY = 'library_config';
const CACHE_KEY = 'library_cache';
const TOKEN_KEY = 'library_token';
const TOKEN_TIME_KEY = 'library_token_time';
let config = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}');
let allBooks = [];
let activeFilter = 'all';
let accessToken = null;

// EPUB READER STATE
let currentZip = null;
let currentSpine = []; // Array of { id, href, fullPath }
let currentIndex = 0;
let blobUrls = [];
let readerFontSize = 18;

// ── INIT ──
window.onload = () => {
  const hash = window.location.hash;
  if (hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    accessToken = params.get('access_token');
    localStorage.setItem(TOKEN_KEY, accessToken);
    localStorage.setItem(TOKEN_TIME_KEY, Date.now().toString());
    window.location.hash = '';
    showApp();
    loadLibrary();
    return;
  }
  const stored = localStorage.getItem(TOKEN_KEY);
  if (stored && checkToken(false)) {
    accessToken = stored;
    showApp();
    loadLibrary();
  }
};

function checkToken(proactive = true) {
  const token = localStorage.getItem(TOKEN_KEY);
  const time = localStorage.getItem(TOKEN_TIME_KEY);
  if (!token || !time) return false;
  if ((Date.now() - parseInt(time)) / (1000 * 60) > 55) {
    if (proactive) startAuth();
    return false;
  }
  return true;
}

function startAuth() {
  if (!config.clientId) { showConfig(); return; }
  const redirectUri = window.location.href.split('#')[0].split('?')[0];
  window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(config.clientId)}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=https://www.googleapis.com/auth/drive.readonly`;
}

function signOut() {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(TOKEN_TIME_KEY);
  localStorage.removeItem(CACHE_KEY);
  location.reload();
}

// ── DRIVE API ──
async function driveRequest(url) {
  const res = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
  if (res.status === 401) { signOut(); throw new Error('Expired'); }
  return res.json();
}

async function findFolder(name) {
  const data = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`)}&fields=files(id,name)`);
  return data.files && data.files[0] ? data.files[0].id : null;
}

async function recursiveScan(folderId, depth = 0) {
  if (depth > 4) return [];
  const data = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`'${folderId}' in parents and trashed=false`)}&fields=files(id,name,mimeType,thumbnailLink)&pageSize=1000`);
  const items = data.files || [];
  
  const coverFile = items.find(f => f.name.toLowerCase() === 'cover.jpg');
  const coverId = coverFile ? coverFile.id : null;

  let books = items.filter(f => f.name.toLowerCase().endsWith('.epub') || f.name.toLowerCase().endsWith('.pdf'))
    .map(f => ({ id: f.id, filename: f.name, coverId }));

  for (const f of items.filter(f => f.mimeType === 'application/vnd.google-apps.folder')) {
    books = books.concat(await recursiveScan(f.id, depth + 1));
  }
  return books;
}

async function loadLibrary() {
  const cached = localStorage.getItem(CACHE_KEY);
  if (cached) { allBooks = JSON.parse(cached); renderBooks(allBooks); }
  
  try {
    const rootId = await findFolder(config.folderName || 'CalibreLibrary');
    if (!rootId) return;
    const files = await recursiveScan(rootId);
    allBooks = files.map(f => {
      const ext = f.filename.split('.').pop().toLowerCase();
      const parts = f.filename.replace(/\.(epub|pdf)$/i, '').split(' - ');
      return { id: f.id, title: parts[0].trim(), author: parts[1] ? parts[1].trim() : '', format: ext, coverId: f.coverId };
    }).sort((a,b) => a.title.localeCompare(b.title));
    localStorage.setItem(CACHE_KEY, JSON.stringify(allBooks));
    renderBooks(allBooks);
  } catch(e) {}
}

function renderBooks(books) {
  const list = document.getElementById('book-list');
  document.getElementById('book-count').textContent = `${books.length} titles`;
  list.innerHTML = books.map(b => `
    <div class="book-card" onclick="openBook('${b.id}', '${esc(b.title)}', '${b.format}')">
      <div class="book-cover">
        ${b.coverId ? `<img src="https://drive.google.com/thumbnail?id=${b.coverId}&sz=w200" loading="lazy">` : `<div class="book-cover-placeholder"><div>${esc(b.title)}</div></div>`}
        <span class="format-badge ${b.format}">${b.format}</span>
      </div>
      <div class="book-info">
        <div class="book-title">${esc(b.title)}</div>
        <div class="book-author">${esc(b.author)}</div>
      </div>
    </div>
  `).join('');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── CUSTOM EPUB READER (JSZIP) ──
async function openBook(fileId, title, format) {
  if (!checkToken()) return;
  document.getElementById('reader-title').textContent = title;
  document.getElementById('reader-overlay').style.display = 'flex';
  
  if (format === 'pdf') {
    document.getElementById('pdf-frame').src = `https://drive.google.com/file/d/${fileId}/preview`;
    document.getElementById('pdf-frame').style.display = 'block';
    document.getElementById('pdf-close').style.display = 'block';
    return;
  }

  // EPUB Logic
  document.getElementById('epub-content-area').style.display = 'block';
  document.getElementById('reader-nav-controls').style.display = 'flex';
  const container = document.getElementById('epub-container');
  container.innerHTML = 'Unzipping...';

  try {
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { Authorization: `Bearer ${accessToken}` } });
    const buffer = await res.arrayBuffer();
    currentZip = await JSZip.loadAsync(buffer);
    
    // 1. Find OPF
    const containerXml = await currentZip.file("META-INF/container.xml").async("string");
    const opfPath = containerXml.match(/full-path="([^"]+)"/)[1];
    const opfDir = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/') + 1) : '';
    const opfXml = await currentZip.file(opfPath).async("string");
    
    // 2. Parse OPF Spine
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(opfXml, "text/xml");
    const manifest = {};
    xmlDoc.querySelectorAll('manifest > item').forEach(item => {
      manifest[item.getAttribute('id')] = item.getAttribute('href');
    });
    
    currentSpine = [];
    xmlDoc.querySelectorAll('spine > itemref').forEach(ref => {
      const id = ref.getAttribute('idref');
      const href = manifest[id];
      currentSpine.push({ id, href, fullPath: opfDir + href });
    });

    currentIndex = 0;
    renderChapter();
  } catch(e) { container.innerHTML = 'Error: ' + e.message; }
}

async function renderChapter() {
  const container = document.getElementById('epub-container');
  const item = currentSpine[currentIndex];
  if (!item) return;

  container.innerHTML = 'Loading chapter...';
  document.getElementById('epub-content-area').scrollTop = 0;
  
  // Cleanup old blobs
  blobUrls.forEach(url => URL.revokeObjectURL(url));
  blobUrls = [];

  try {
    const html = await currentZip.file(item.fullPath).async("string");
    const doc = new DOMParser().parseFromString(html, "text/html");
    const chapterDir = item.fullPath.includes('/') ? item.fullPath.substring(0, item.fullPath.lastIndexOf('/') + 1) : '';

    // Fix images
    const images = doc.querySelectorAll('img, image');
    for (const img of images) {
      let src = img.getAttribute('src') || img.getAttribute('xlink:href');
      if (src && !src.startsWith('http')) {
        const fullPath = resolvePath(chapterDir, src);
        const file = currentZip.file(fullPath);
        if (file) {
          const blob = await file.async("blob");
          const url = URL.createObjectURL(blob);
          blobUrls.push(url);
          if (img.tagName.toLowerCase() === 'image') img.setAttribute('xlink:href', url);
          else img.src = url;
        }
      }
    }

    container.innerHTML = doc.body.innerHTML;
    container.style.fontSize = readerFontSize + 'px';
    
    document.getElementById('prev-btn').disabled = currentIndex === 0;
    document.getElementById('next-btn').disabled = currentIndex === currentSpine.length - 1;
  } catch(e) { container.innerHTML = 'Render error: ' + e.message; }
}

function resolvePath(base, rel) {
  const stack = base.split("/").filter(p => p !== '');
  stack.pop(); // remove filename/dir if base is current file's dir
  const parts = rel.split("/");
  for (const part of parts) {
    if (part === ".") continue;
    if (part === "..") stack.pop();
    else stack.push(part);
  }
  return stack.join("/");
}

function prevChapter() { if (currentIndex > 0) { currentIndex--; renderChapter(); } }
function nextChapter() { if (currentIndex < currentSpine.length - 1) { currentIndex++; renderChapter(); } }

function changeFontSize(delta) {
  readerFontSize = Math.max(12, Math.min(40, readerFontSize + delta));
  document.getElementById('epub-container').style.fontSize = readerFontSize + 'px';
}

function closeReader() {
  document.getElementById('reader-overlay').style.display = 'none';
  document.getElementById('pdf-frame').src = '';
  document.getElementById('epub-container').innerHTML = '';
  document.getElementById('epub-content-area').style.display = 'none';
  document.getElementById('reader-nav-controls').style.display = 'none';
  document.getElementById('pdf-close').style.display = 'none';
  blobUrls.forEach(url => URL.revokeObjectURL(url));
  blobUrls = [];
  currentZip = null;
}

// ── MISC UTILS ──
function showApp() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app').style.display = 'flex'; }
function showConfig() { document.getElementById('cfg-client-id').value = config.clientId || ''; document.getElementById('config-modal').style.display = 'flex'; }
function hideConfig() { document.getElementById('config-modal').style.display = 'none'; }
function saveConfig() { config.clientId = document.getElementById('cfg-client-id').value.trim(); config.folderName = document.getElementById('cfg-folder').value.trim() || 'CalibreLibrary'; localStorage.setItem(CONFIG_KEY, JSON.stringify(config)); hideConfig(); }
function setFilter(type, btn) { activeFilter = type; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); applyFilters(); }
function filterBooks() { applyFilters(); }
function applyFilters() { const q = document.getElementById('search').value.toLowerCase(); let books = allBooks; if (activeFilter !== 'all') books = books.filter(b => b.format === activeFilter); if (q) books = books.filter(b => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q)); renderBooks(books); }
</script>
