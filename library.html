<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
<title>LIBRARY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #0e0d0b; --surface: #161410; --border: #2a2620; --text: #e8e0d0; --muted: #6b6358;
    --accent: #c9a84c; --accent-red: #ff6b6b; --accent-green: #51cf66; --reader-bg: #f5f0e8; --reader-text: #1a1610;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 13px; min-height: 100vh; overflow-x: hidden; }

  #auth-screen { display: block; min-height: 100vh; text-align: center; padding: 10vh 2rem 5vh; }
  .auth-title { font-family: 'Playfair Display', serif; font-size: 50px; font-weight: 700; color: var(--accent); margin-bottom: 0.5rem; }
  .auth-subtitle { color: var(--muted); font-size: 10px; text-transform: uppercase; margin-bottom: 2rem; letter-spacing: 0.3em; }

  /* ── DIRECT CONFIG ── */
  #direct-config { background: var(--surface); border: 1px solid var(--border); padding: 1.5rem; max-width: 360px; margin: 0 auto 2rem; text-align: left; border-radius: 8px; }
  .field-label { display: block; color: var(--muted); font-size: 9px; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 1px; }
  .field-input { width: 100%; background: #000; border: 1px solid var(--border); color: var(--text); padding: 0.7rem; margin-bottom: 1rem; border-radius: 4px; font-family: inherit; font-size: 13px; }
  
  #app { display: none; min-height: 100vh; }
  header { display: block; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); position: relative; background: var(--bg); z-index: 100; overflow: hidden; }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--accent); letter-spacing: 0.2em; float: left; }
  #search { float: right; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 0.8rem; width: 200px; outline: none; }

  #book-list { padding: 1.5rem; display: block; font-size: 0; }
  .book-card { display: inline-block; width: 150px; background: var(--surface); border: 1px solid var(--border); cursor: pointer; margin-right: 1.5rem; margin-bottom: 1.5rem; vertical-align: top; font-size: 13px; }
  .book-cover { width: 100%; height: 220px; background: var(--bg); position: relative; overflow: hidden; }
  .book-cover img { width: 100%; height: 100%; display: block; border: 0; }
  .book-info { padding: 0.8rem; }
  .book-title { font-family: 'Playfair Display', serif; font-size: 11px; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .book-author { color: var(--muted); font-size: 9px; }

  /* ── READER ── */
  #reader-overlay { display: none; position: fixed; inset: 0; background: var(--reader-bg); z-index: 1000; overflow: hidden; }
  #epub-content-area { position: absolute; top: 50px; bottom: 0; left: 0; right: 0; overflow-y: auto; background: var(--reader-bg); -webkit-overflow-scrolling: touch; }
  #epub-container { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 4rem; color: var(--reader-text); font-family: 'PT Serif', serif; font-size: 17px; line-height: 1.8; }
  
  /* ── DEBUG & DIAGNOSTICS ── */
  #diag-panel { margin: 2rem auto; max-width: 360px; text-align: left; background: #1a1814; border: 1px solid #332d24; padding: 1rem; color: #887e6a; font-family: monospace; font-size: 9px; }
  .diag-item { border-bottom: 1px solid #28241d; padding: 4px 0; overflow: hidden; }
  .diag-item span { float: right; color: var(--accent); }
  #error-monitor { color: #ff6b6b; font-size: 10px; text-align: left; padding: 1rem; border: 1px dashed #ff6b6b; display: none; margin: 1rem auto; max-width: 360px; }
  .ctrl-btn { background: #fdfcf9; border: 1px solid #c4bdb0; color: #4a443a; font-size: 11px; padding: 0.5rem 1rem; cursor: pointer; display: inline-block; text-decoration: none; border-radius: 4px; font-weight: bold; }
  .btn-accent { background: var(--accent) !important; color: var(--bg) !important; border: none !important; }
</style>
<script>
window.onerror = function(msg, url, line) {
  var m = document.getElementById('error-monitor');
  if (m) { m.style.display = 'block'; m.innerHTML += '<div>Line ' + line + ': ' + msg + '</div>'; }
};
</script>
</head>
<body>

<div id="auth-screen">
  <div class="auth-title">LIBRARY</div>
  <div class="auth-subtitle">Personal ePub Collection</div>
  
  <!-- DIRECT INPUT -->
  <div id="direct-config">
    <label class="field-label">OAuth Client ID</label>
    <input class="field-input" id="cfg-client-id" placeholder="Paste Client ID...">
    <label class="field-label">Drive Folder</label>
    <input class="field-input" id="cfg-folder" value="CalibreLibrary">
    <div style="text-align: right;">
        <button class="ctrl-btn btn-accent" onclick="saveConfig()">Save Settings</button>
    </div>
  </div>

  <div style="margin-bottom: 1.5rem;">
    <button class="ctrl-btn btn-accent" style="padding: 1.2rem 4rem; font-size: 18px;" onclick="startAuth()">Sign in with Google</button>
  </div>

  <div style="color: var(--muted); font-size: 10px;">
    <a href="javascript:alert('Interactivity Check: OK')" style="color:#888; text-decoration: none;">Touch Test</a>
    <span style="margin: 0 1rem;">|</span>
    <a href="javascript:injectTestId()" style="color:var(--accent-red); text-decoration: none;">Inject Test ID</a>
  </div>

  <div id="error-monitor"></div>

  <div id="diag-panel">
    <div style="font-weight: bold; color: #b5a687; margin-bottom: 10px; text-transform: uppercase;">Detailed Bypass Scan</div>
    <div class="diag-item">typeof Promise <span id="st-promise">...</span></div>
    <div class="diag-item">typeof Blob <span id="st-blob">...</span></div>
    <div class="diag-item">BlobBuilder <span id="st-builder">...</span></div>
    <div class="diag-item">LocalStorage <span id="st-storage">...</span></div>
    <div class="diag-item">Active Client ID <span id="st-clientid" style="color:#fff">NONE</span></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">LIBRARY</div>
    <input type="search" id="search" placeholder="search..." oninput="filterBooks()">
    <button class="ctrl-btn" style="border:none; color:var(--muted); float:right;" onclick="signOut()">Sign out</button>
  </header>
  <div id="loading" style="text-align:center; padding:2rem;"><div class="spinner"></div></div>
  <div id="book-list"></div>
</div>

<div id="reader-overlay">
  <div style="height:50px; background:#ede8e0; border-bottom:1px solid #d4cdc0; padding:10px;">
     <button class="ctrl-btn" onclick="closeReader()">✕ Close</button>
     <span id="reader-title" style="margin-left:1rem; font-family:'Playfair Display'; font-size:13px;"></span>
  </div>
  <div id="epub-content-area"><div id="epub-container"></div></div>
</div>

<script>
// Polyfill origin 
if (!window.location.origin) window.location.origin = window.location.protocol + "//" + window.location.hostname + (window.location.port ? ':' + window.location.port: '');

// Global persistence object
window.safeStorage = {
  data: {},
  get: function(k) { try { return localStorage.getItem(k); } catch(e) { return this.data[k] || null; } },
  set: function(k, v) { try { localStorage.setItem(k, v); } catch(e) { this.data[k] = v; } },
  remove: function(k) { try { localStorage.removeItem(k); } catch(e) { delete this.data[k]; } }
};

window.CONFIG_KEY = 'library_config';
window.config = JSON.parse(window.safeStorage.get(window.CONFIG_KEY) || '{}');

window.onload = function() {
  document.getElementById('st-promise').innerHTML = typeof Promise;
  document.getElementById('st-blob').innerHTML = typeof Blob;
  var bb = window.BlobBuilder || window.WebKitBlobBuilder || window.MozBlobBuilder;
  document.getElementById('st-builder').innerHTML = typeof bb;
  try { localStorage.setItem('_t','1'); localStorage.removeItem('_t'); document.getElementById('st-storage').innerHTML='OK'; } catch(e) { document.getElementById('st-storage').innerHTML='LOCKED'; }
  
  if (window.config.clientId) {
      document.getElementById('st-clientid').innerHTML = window.config.clientId.substring(0, 8) + '...';
      document.getElementById('cfg-client-id').value = window.config.clientId;
  }
  if (window.config.folderName) document.getElementById('cfg-folder').value = window.config.folderName;

  var hash = window.location.hash;
  if (hash.indexOf('access_token') !== -1) {
    var token = hash.split('access_token=')[1].split('&')[0];
    window.accessToken = token;
    window.safeStorage.set('library_token', token);
    window.location.hash = ''; showApp(); loadLibrary();
  }
};

function saveConfig() {
  alert('Trace: saveConfig start');
  var id = document.getElementById('cfg-client-id').value.toString().replace(/\s/g, '');
  var f = document.getElementById('cfg-folder').value.toString();
  alert('Trace: ID read [' + id.substring(0, 4) + ']');
  window.config.clientId = id;
  window.config.folderName = f;
  window.safeStorage.set(window.CONFIG_KEY, JSON.stringify(window.config));
  document.getElementById('st-clientid').innerHTML = id.substring(0, 8) + '...';
  alert('Trace: window.config updated');
}

function injectTestId() {
  alert('Trace: Injecting TEST_ID');
  document.getElementById('cfg-client-id').value = 'TEST_ID_1234567890';
  saveConfig();
}

function startAuth() {
  alert('Trace: startAuth');
  if (!window.config.clientId || window.config.clientId === 'NONE') {
      alert('Trace: Client ID empty in memory'); return;
  }
  var base = window.location.origin + window.location.pathname;
  var url = 'https://accounts.google.com/o/oauth2/v2/auth?client_id=' + encodeURIComponent(window.config.clientId) + '&redirect_uri=' + encodeURIComponent(base) + '&response_type=token&scope=https://www.googleapis.com/auth/drive.readonly';
  alert('Trace: Redirecting...');
  window.location.href = url;
}

function showApp() { document.getElementById('auth-screen').style.display='none'; document.getElementById('app').style.display='block'; }
function signOut() { window.safeStorage.remove('library_token'); location.reload(); }

function loadLibrary() { alert('Loading Library...'); }
function closeReader() { document.getElementById('reader-overlay').style.display='none'; }
</script>
</body>
</html>
